apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: noteops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aneeswar/notesops-config.git
    targetRevision: HEAD
    path: deploy/helm
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
