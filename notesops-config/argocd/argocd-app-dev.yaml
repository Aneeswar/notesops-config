apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notes-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aneeswar/notesops-config.git
    targetRevision: HEAD
    path: notesops-config/kustomize/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
