apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notes-app-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aneeswar/notesops-config.git
    targetRevision: HEAD
    path: notesops-config/kustomize/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: false
