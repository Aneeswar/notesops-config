apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
namespace: prod
namePrefix: prod-

images:
- name: aneeswar/notes-app
  newName: aneeswar/notes-app
  newTag: latest

patches:
- target:
    kind: Rollout
    name: notes-app
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 2
